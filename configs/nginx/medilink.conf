# Configuration Nginx — ML-SRV-WEB-01
# Cabinet Médical MediLink · VLAN 50 DMZ · 192.168.50.2
# Jedha Bootcamp 2025

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name medilink.cabinet.local 192.168.50.2;
    return 301 https://$host$request_uri;
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    server_name medilink.cabinet.local 192.168.50.2;

    # Certificats SSL
    ssl_certificate /etc/nginx/ssl/medilink.crt;
    ssl_certificate_key /etc/nginx/ssl/medilink.key;

    # Protocoles et ciphers sécurisés
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # Headers de sécurité OWASP
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Masquer la version Nginx
    server_tokens off;

    # Racine du site
    root /var/www/medilink;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Logs
    access_log /var/log/nginx/medilink_access.log;
    error_log /var/log/nginx/medilink_error.log;
}
